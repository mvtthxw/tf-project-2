apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-managed.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "app-managed.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-managed.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app-managed.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PARAMS_STORE
              valueFrom:
                secretKeyRef:
                  name: {{ include "app-managed.fullname" . }}-env
                  key: PARAMS_STORE
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
